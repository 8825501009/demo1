{% extends 'base.html' %}

{% block content %}

<h2>Edit Employee ✏️</h2>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name"
               value="{{ employee.name }}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email"
               value="{{ employee.email }}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Phone</label>
        <input type="text" name="phone"
               value="{{ employee.phone }}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Department</label>
        <input type="text" name="department"
               value="{{ employee.department }}"
               class="form-control">
    </div>

    <div class="mb-3">
        <label>Joining Date</label>
    
    <input type="date" name="joining_date" value="{{ employee.joining_date|date:'Y-m-d' }}" class="form-control">

    <button type="submit" class="btn btn-primary">
        Update Employee
    </button>
    </div>
</form>

{% endblock %}
