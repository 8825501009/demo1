{% extends 'base.html' %}

{% block content %}

<div class="col-md-5 mx-auto">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Employee Login
        </h2>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   class="form-control mb-3"
                   placeholder="Username">

            <input type="password"
                   name="password"
                   class="form-control mb-3"
                   placeholder="Password">

            <button class="btn btn-primary w-100">
                Login
            </button>

            <button class="btn btn-secondary w-100 mt-2" type="button" onclick="location.href='{% url 'logout' %}'">
                Logout
            </button>

            
        </form>

    </div>

</div>

{% endblock %}
